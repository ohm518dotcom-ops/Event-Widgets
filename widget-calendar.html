<!-- WEBFLOW EMBED: Calendar Widget Starts -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
<style>
body { background-color: #060606; margin: 0; padding: 24px; }
/* Vibe & Variables */
.ohm-calendar-layout {
    --bg-color: #0f0f0f;
    --text-primary: #f0f0f0;
    --text-secondary: rgba(255, 255, 255, 0.6);
    --border-color: #1a1a1a;
    --border-hover: #333333;
    --accent-color: #ffffff;
    --glass-hover: rgba(255, 255, 255, 0.08);
    --font-family: 'Inter', sans-serif;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --transition: all 0.2s ease;

    position: relative;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 850px;
    font-family: var(--font-family);
    color: var(--text-primary);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}
.ohm-calendar-layout * { box-sizing: border-box; margin: 0; padding: 0; }
@media (min-width: 768px) {
    .ohm-calendar-layout { flex-direction: row; align-items: stretch; gap: 20px; }
}

.ohm-calendar-widget {
    background-color: transparent;
    border-radius: var(--radius-lg);
    padding: 20px;
    border: none;
    width: 100%;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
@media (min-width: 768px) {
    .ohm-calendar-widget { flex: 1; min-width: 300px; padding: 0; }
}

/* Base: Mobile acts as an absolute overlay modal */
.ohm-calendar-details {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 100;
    background-color: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: none;
    flex-direction: column;
    padding: 20px;
    border-radius: var(--radius-lg);
    overflow-y: auto;
}
.ohm-calendar-details.active { display: flex; }

/* Desktop: Acts as a side-by-side equal height panel */
@media (min-width: 768px) {
    .ohm-calendar-details { 
        position: static; 
        display: flex;
        flex: 1; 
        background-color: transparent;
        border: none;
        backdrop-filter: none;
        padding: 0;
        z-index: 1;
        border-radius: var(--radius-lg);
        overflow-y: visible;
    }
}

.ohm-calendar-details-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.ohm-calendar-details-title { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }

.ohm-calendar-details-close {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border-color); color: #fff; cursor: pointer;
    width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
}
.ohm-calendar-details-close svg { fill: currentColor; width: 20px; height: 20px; }
.ohm-calendar-details-close:hover { background-color: var(--glass-hover); }

/* Hide close button on desktop */
@media (min-width: 768px) {
    .ohm-calendar-details-close { display: none; }
}

.ohm-calendar-details-content { display: flex; flex-direction: column; gap: 14px; flex-grow: 1; }
.ohm-empty-state { color: var(--text-secondary); font-size: 14px; text-align: center; margin: auto; padding: 32px 0; }


.ohm-calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
}

.ohm-calendar-title { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }

.ohm-nav-btns { display: flex; gap: 6px; }

.ohm-icon-btn {
    background: transparent; border: 1px solid transparent; color: var(--text-secondary);
    cursor: pointer; width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
}

.ohm-icon-btn:hover { background-color: var(--glass-hover); color: var(--text-primary); border-color: var(--border-color); }
.ohm-icon-btn svg { width: 18px; height: 18px; fill: currentColor; }

.ohm-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
    font-size: 11px; font-weight: 600; color: var(--text-secondary);
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em;
}

.ohm-days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

.ohm-day {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; border-radius: var(--radius-sm); font-size: 14px;
    transition: var(--transition); position: relative; user-select: none;
}

.ohm-day.active-month:hover { background-color: var(--glass-hover); cursor: pointer; }
.ohm-day.other-month { color: #333; }

.ohm-day.today { font-weight: 700; }
.ohm-day.today::before {
    content: ''; position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; background-color: var(--accent-color);
    border-radius: 50%;
}

.ohm-day.selected {
    background-color: var(--text-primary); color: #000; font-weight: 700;
    border: none !important;
}

.ohm-day.has-events { 
    border: 1px solid rgba(255,255,255,0.3);
}

/* Loader */
.ohm-loader {
    width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.08);
    border-top-color: var(--accent-color); border-radius: 50%;
    animation: ohm-spin 1s linear infinite; display: none; margin-left: auto;
}
.ohm-calendar-widget.loading .ohm-loader { display: block; }
@keyframes ohm-spin { to { transform: rotate(360deg); } }

/* Card Styles */
.ohm-card {
    background-color: var(--bg-color); border: 1px solid var(--border-color);
    border-radius: var(--radius-md); overflow: hidden; display: flex; flex-direction: column;
    transition: var(--transition);
}
.ohm-card:hover { border-color: var(--border-hover); }
.ohm-card-img { width: 100%; height: 140px; object-fit: cover; background-color: #161616; border-bottom: 1px solid var(--border-color); }
.ohm-card-content { padding: 16px; display: flex; flex-direction: column; }
.ohm-card-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
.ohm-card-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; line-height: 1.3; color: var(--text-primary); }
.ohm-card-meta { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; line-height: 1.4;}
.ohm-card-meta svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; margin-top: 2px;}
.ohm-card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-top: 10px; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.ohm-ticket-btn {
    display: inline-flex; justify-content: center; align-items: center; gap: 8px;
    background-color: var(--text-primary); color: #000; padding: 9px 14px;
    border-radius: var(--radius-sm); text-decoration: none; font-size: 13px; font-weight: 600;
    transition: var(--transition); border: 1px solid transparent; width: 100%;
}
.ohm-ticket-btn:hover { background-color: transparent; color: var(--text-primary); border-color: var(--text-primary); }
</style>

<div class="ohm-calendar-layout" id="ohm-calendar-layout">
    <div class="ohm-calendar-widget" id="ohm-calendar">
    <div class="ohm-calendar-header">
        <div class="ohm-calendar-title" id="ohm-month-year">Month Year</div>
        <div class="ohm-loader"></div>
        <div class="ohm-nav-btns">
            <button class="ohm-icon-btn" id="ohm-prev" aria-label="Previous Month">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <button class="ohm-icon-btn" id="ohm-next" aria-label="Next Month">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>
    </div>
    
    <div class="ohm-weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    
    <div class="ohm-days-grid" id="ohm-grid"></div>

    </div>

    <!-- Side Details Panel -->
    <div class="ohm-calendar-details" id="ohm-calendar-details">
        <div class="ohm-calendar-details-header">
            <div class="ohm-calendar-details-title" id="ohm-details-title">Upcoming Events</div>
            <button class="ohm-calendar-details-close" id="ohm-details-close" aria-label="Close Modal">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="ohm-calendar-details-content" id="ohm-details-content">
            <div class="ohm-empty-state">Select a date to view events</div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';
    // CONFIG REQUIRED: Update these keys
    const SUPABASE_URL = 'https://pcutqzebmgiorfrajgcl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjdXRxemVibWdpb3JmcmFqZ2NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTEyOTIsImV4cCI6MjA4ODkyNzI5Mn0.tOjrxRSG6WXL5jZWoRYJgg9SbKeExwd1Cq_v1v_ld0k';
    const USE_REAL_SUPABASE = true; 

    const container = document.getElementById('ohm-calendar');
    const grid = document.getElementById('ohm-grid');
    const monthYear = document.getElementById('ohm-month-year');
    
    let currentDate = new Date();
    let events = [];

    async function fetchEvents() {
        container.classList.add('loading');
        if (!USE_REAL_SUPABASE) {
            // Mock data for demo
            const now = new Date();
            const tmrw = new Date(now); tmrw.setDate(now.getDate() + 1);
            const nextWk = new Date(now); nextWk.setDate(now.getDate() + 7);
            events = [
                {
                    title: 'Techno Night: Volume 1', description: 'Deep dark techno event running until early morning.',
                    start_time: now, end_time: new Date(now.getTime() + 4 * 3600000), location_name: 'Empire Underground',
                    address: '93 N Pearl St, Albany, NY 12207',
                    image_url: 'https://images.unsplash.com/photo-1571266028243-cb40fce7573f?q=80&w=600&auto=format&fit=crop', 
                    tag: 'Music', ticket_url: '#'
                },
                {
                    title: 'DRUM & BASS: The Movement', description: 'Documentary screening & sets.',
                    start_time: tmrw, location_name: 'Alias Coffee', address: '76 N Pearl St, Albany, NY 12207',
                    image_url: 'https://images.unsplash.com/photo-1598387181032-a3103ea27146?q=80&w=600&auto=format&fit=crop', 
                    tag: 'Art / Music', ticket_url: '#'
                },
                {
                    title: 'Ambient Gallery', description: 'Live ambient soundscapes.',
                    start_time: nextWk, location_name: 'Albany Barn', address: '56 2nd St, Albany, NY 12210',
                    tag: 'Art', ticket_url: '#'
                }
            ];
            setTimeout(() => { container.classList.remove('loading'); renderCalendar(); }, 500);
            return;
        }

        try {
            const startStr = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).toISOString();
            const endStr = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).toISOString();
            
            // Only fetch events for the current month view
            const response = await fetch(`${SUPABASE_URL}/rest/v1/events?select=*&start_time=gte.${startStr}&start_time=lte.${endStr}`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if(response.ok) {
                const data = await response.json();
                events = data.map(e => ({ ...e, start_time: new Date(e.start_time) }));
            }
        } catch(e) { 
            console.error("Calendar Widget err:", e); 
        } finally {
            container.classList.remove('loading');
            renderCalendar();
        }
    }

    function renderCalendar() {
        grid.innerHTML = '';
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        monthYear.textContent = `${monthNames[month]} ${year}`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();
        const today = new Date();
        const isCurrentMonth = today.getMonth() === month && today.getFullYear() === year;

        // Populate days
        for (let i = 0; i < 42; i++) {
            const dayEl = document.createElement('div');
            dayEl.className = 'ohm-day';

            if (i < firstDay) {
                dayEl.textContent = daysInPrevMonth - firstDay + i + 1;
                dayEl.classList.add('other-month');
            } else if (i >= firstDay && i < firstDay + daysInMonth) {
                const dayNum = i - firstDay + 1;
                dayEl.textContent = dayNum;
                dayEl.classList.add('active-month');
                
                if (isCurrentMonth && dayNum === today.getDate()) {
                    dayEl.classList.add('today');
                }

                // Check events
                const cellDate = new Date(year, month, dayNum);
                dayEl.dataset.date = `${year}-${month}-${dayNum}`;
                const dayEvents = events.filter(e => 
                    e.start_time.getFullYear() === year &&
                    e.start_time.getMonth() === month &&
                    e.start_time.getDate() === dayNum
                );
                
                if (dayEvents.length > 0) {
                    dayEl.classList.add('has-events');
                    
                    const formatterDate = new Intl.DateTimeFormat('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    dayEl.addEventListener('click', () => selectDay(dayEl, formatterDate.format(cellDate), dayEvents));
                }
            } else {
                dayEl.textContent = i - firstDay - daysInMonth + 1;
                dayEl.classList.add('other-month');
            }
            grid.appendChild(dayEl);
        }
        function selectUpcomingEvent() {
        const now = new Date();
        const upcomingEvents = [...events].filter(e => e.start_time >= now).sort((a,b) => a.start_time - b.start_time);
        
        if (upcomingEvents.length > 0) {
            const nextEvent = upcomingEvents[0];
            const dayEvents = events.filter(e => 
                e.start_time.getFullYear() === nextEvent.start_time.getFullYear() &&
                e.start_time.getMonth() === nextEvent.start_time.getMonth() &&
                e.start_time.getDate() === nextEvent.start_time.getDate()
            );
            const formatterDate = new Intl.DateTimeFormat('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            selectDay(document.querySelector(`.ohm-day[data-date="${nextEvent.start_time.getFullYear()}-${nextEvent.start_time.getMonth()}-${nextEvent.start_time.getDate()}"]`), formatterDate.format(nextEvent.start_time), dayEvents);
        } else {
            if (events.length > 0) {
                const firstEvent = [...events].sort((a,b) => a.start_time - b.start_time)[0];
                const dayEvents = events.filter(e => 
                    e.start_time.getFullYear() === firstEvent.start_time.getFullYear() &&
                    e.start_time.getMonth() === firstEvent.start_time.getMonth() &&
                    e.start_time.getDate() === firstEvent.start_time.getDate()
                );
                const formatterDate = new Intl.DateTimeFormat('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                selectDay(document.querySelector(`.ohm-day[data-date="${firstEvent.start_time.getFullYear()}-${firstEvent.start_time.getMonth()}-${firstEvent.start_time.getDate()}"]`), formatterDate.format(firstEvent.start_time), dayEvents);
            } else {
                selectDay(null, "Upcoming Events", []);
                detailsContent.innerHTML = '<div class="ohm-empty-state">No events this month</div>';
            }
        }
    }
    selectUpcomingEvent();
}

    const detailsPanel = document.getElementById('ohm-calendar-details');
    const detailsClose = document.getElementById('ohm-details-close');
    
    detailsClose.addEventListener('click', () => {
        detailsPanel.classList.remove('active');
    });
    const detailsContent = document.getElementById('ohm-details-content');
    const detailsTitle = document.getElementById('ohm-details-title');

    function selectDay(dayEl, title, dayEvents) {
        document.querySelectorAll('.ohm-day.selected').forEach(el => el.classList.remove('selected'));
        if (dayEl) dayEl.classList.add('selected');
        displayEvents(title, dayEvents);
    }
    
    function displayEvents(title, dayEvents) {
        detailsPanel.classList.add('active');
        detailsTitle.textContent = title;
        detailsContent.innerHTML = '';
        
        if (!dayEvents || dayEvents.length === 0) {
            detailsContent.innerHTML = '<div class="ohm-empty-state">No events found.</div>';
            return;
        }

        const formatterDate = new Intl.DateTimeFormat('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const formatterTime = new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit' });
        
        dayEvents.forEach(event => {
            const dateStr = formatterDate.format(event.start_time);
            const startTimeStr = formatterTime.format(event.start_time);
            let timeString = `${dateStr} • ${startTimeStr}`;
            
            if (event.end_time) {
                const endTimeStr = formatterTime.format(new Date(event.end_time));
                timeString += ` - ${endTimeStr}`;
            }

            let locationString = event.location_name || '';
            if (event.address) {
                 locationString += locationString ? `<br><span style="color:#888; font-size:12px;">${event.address}</span>` : event.address;
            }

            const card = document.createElement('div');
            card.className = 'ohm-card';
            card.innerHTML = `
                ${event.image_url ? `<img src="${event.image_url}" alt="${event.title}" class="ohm-card-img" loading="lazy">` : ''}
                <div class="ohm-card-content">
                    ${event.tag ? `<div class="ohm-card-tag">${event.tag}</div>` : ''}
                    <h3 class="ohm-card-title">${event.title}</h3>
                    <div class="ohm-card-meta">
                        <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/></svg>
                        <div>${timeString}</div>
                    </div>
                    ${locationString ? `
                    <div class="ohm-card-meta">
                        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        <div>${locationString}</div>
                    </div>` : ''}
                    ${event.description ? `<div class="ohm-card-desc">${event.description}</div>` : '<div style="flex-grow:1;"></div>'}
                    ${event.ticket_url ? `
                    <a href="${event.ticket_url}" target="_blank" rel="noopener noreferrer" class="ohm-ticket-btn">
                        Get Tickets
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </a>
                    ` : ''}
                </div>
            `;
            detailsContent.appendChild(card);
        });
        
        
    }

    document.getElementById('ohm-prev').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        fetchEvents();
    });
    
    document.getElementById('ohm-next').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        fetchEvents();
    });

    // Init
    fetchEvents();
})();
</script>
<!-- WEBFLOW EMBED: Calendar Widget Ends -->
