<!-- WEBFLOW EMBED: Hybrid Widget Starts -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
body { background-color: #060606; margin: 0; padding: 24px; }
/* Vibe & Variables */
.ohm-hybrid-layout {
    --surface-color: #0f0f0f;
    --surface-elevated: #161616;
    --text-primary: #f0f0f0;
    --text-secondary: rgba(255, 255, 255, 0.6);
    --border-color: #1a1a1a;
    --border-hover: #333333;
    --bg-base: #060606;
    --accent-color: #ffffff;
    --glass-hover: rgba(255, 255, 255, 0.08);
    --font-family: 'Inter', sans-serif;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --transition: all 0.2s ease;
    
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 24px;
    font-family: var(--font-family);
    color: var(--text-primary);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

.ohm-hybrid-layout * { box-sizing: border-box; margin: 0; padding: 0; }

@media (min-width: 900px) {
    .ohm-hybrid-layout {
        flex-direction: row;
        align-items: flex-start;
    }
    .ohm-calendar-widget {
        flex: 0 0 340px;
        position: sticky;
        top: 24px;
    }
    .ohm-cards-widget {
        flex: 1;
        min-width: 0;
    }
}

/* Calendar Styles */
.ohm-calendar-widget {
    background-color: var(--surface-color);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 22px;
    display: flex;
    flex-direction: column;
}
.ohm-calendar-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;
}
.ohm-calendar-title { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
.ohm-nav-btns { display: flex; gap: 6px; }
.ohm-icon-btn {
    background: transparent; border: 1px solid transparent; color: var(--text-secondary);
    cursor: pointer; width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; transition: var(--transition);
}
.ohm-icon-btn:hover { background-color: var(--glass-hover); color: var(--text-primary); border-color: var(--border-color); }
.ohm-icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
.ohm-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
    font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.04em;
}
.ohm-days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.ohm-day {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; border-radius: var(--radius-sm); font-size: 14px;
    transition: var(--transition); position: relative; user-select: none;
}
.ohm-day.active-month:hover { background-color: var(--glass-hover); cursor: pointer; }
.ohm-day.other-month { color: #333; }
.ohm-day.today { font-weight: 700; }
.ohm-day.today::before {
    content: ''; position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; background-color: var(--accent-color); border-radius: 50%;
}
.ohm-day.selected {
    background-color: var(--text-primary); color: #000; font-weight: 700; border: none !important;
}
.ohm-day.has-events { border: 1px solid rgba(255,255,255,0.3); }

/* Cards Styles */
.ohm-cards-widget { width: 100%; display: flex; flex-direction: column; background-color: transparent;}
.ohm-cards-header {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border-color); padding-bottom: 14px; margin-bottom: 20px;
}
.ohm-cards-title { font-size: 18px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
.ohm-cards-count { color: var(--text-secondary); font-size: 13px; font-weight: 500; }
.ohm-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

@media (max-width: 600px) {
    .ohm-cards-grid { grid-template-columns: 1fr; gap: 14px; }
}

.ohm-card {
    background-color: var(--surface-color); border: 1px solid var(--border-color);
    border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column;
    transition: var(--transition); height: 100%;
}
.ohm-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4); }
.ohm-card-img { width: 100%; height: 160px; object-fit: cover; background-color: #161616; border-bottom: 1px solid var(--border-color); }
.ohm-card-content { padding: 18px; display: flex; flex-direction: column; flex-grow: 1; }
.ohm-card-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
.ohm-card-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; line-height: 1.3; color: var(--text-primary); }
.ohm-card-meta { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; line-height: 1.4;}
.ohm-card-meta svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; margin-top: 2px;}
.ohm-card-desc {
    font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-top: 12px; margin-bottom: 16px;
    display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; flex-grow: 1;
}
.ohm-ticket-btn {
    display: inline-flex; justify-content: center; align-items: center; gap: 8px;
    background-color: var(--text-primary); color: #000; padding: 10px 16px;
    border-radius: var(--radius-sm); text-decoration: none; font-size: 13px; font-weight: 600;
    transition: var(--transition); border: 1px solid transparent; width: 100%;
}
.ohm-ticket-btn:hover { background-color: transparent; color: var(--text-primary); border-color: var(--text-primary); }

/* Filters & Search */
.ohm-cards-filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
.ohm-filter-btns {
    display: flex; gap: 4px; background: var(--surface-color); padding: 4px;
    border-radius: var(--radius-sm); border: 1px solid var(--border-color);
}
.ohm-filter-btn {
    background: transparent; border: none; color: var(--text-secondary); padding: 7px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition); font-family: var(--font-family);
}
.ohm-filter-btn.active { background: var(--text-primary); color: #000; }
.ohm-filter-btn:hover:not(.active) { color: var(--text-primary); }
.ohm-search-container { flex-grow: 1; position: relative; min-width: 180px; }
.ohm-search-input {
    width: 100%; background: var(--surface-color); border: 1px solid var(--border-color); color: var(--text-primary);
    padding: 9px 12px 9px 36px; border-radius: var(--radius-sm); font-size: 14px; outline: none;
    transition: var(--transition); font-family: var(--font-family); box-sizing: border-box;
}
.ohm-search-input::placeholder { color: #444; }
.ohm-search-input:focus { border-color: var(--border-hover); box-shadow: 0 0 0 3px rgba(255,255,255,0.03); }
.ohm-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; fill: var(--text-secondary); pointer-events: none;}

@media (max-width: 600px) {
    .ohm-cards-filters { gap: 8px; }
    .ohm-search-container { min-width: 100%; }
}

/* Loader */
.ohm-state-msg {
    padding: 40px 20px; text-align: center; color: var(--text-secondary);
    background-color: var(--surface-color); border-radius: var(--radius-lg);
    border: 1px dashed var(--border-color); grid-column: 1 / -1;
}
.ohm-loader { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.08); border-top-color: #fff; border-radius: 50%; animation: ohm-spin 1s linear infinite; margin: 0 auto 16px; display: none;}
.ohm-hybrid-layout.loading .ohm-loader { display: block; }
@keyframes ohm-spin { to { transform: rotate(360deg); } }
</style>

<div class="ohm-hybrid-layout" id="ohm-hybrid-layout">
    <!-- Calendar Component -->
    <div class="ohm-calendar-widget" id="ohm-calendar">
        <div class="ohm-calendar-header">
            <div class="ohm-calendar-title" id="ohm-month-year">Month Year</div>
            <div class="ohm-nav-btns">
                <button class="ohm-icon-btn" id="ohm-prev" aria-label="Previous Month">
                    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </button>
                <button class="ohm-icon-btn" id="ohm-next" aria-label="Next Month">
                    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                </button>
            </div>
        </div>
        <div class="ohm-weekdays">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div class="ohm-days-grid" id="ohm-calendar-grid"></div>
    </div>

    <!-- Cards Component -->
    <div class="ohm-cards-widget" id="ohm-cards-container">
        <div class="ohm-cards-header">
             <div style="display: flex; align-items: center; gap: 12px;">
                 <div class="ohm-cards-title" id="ohm-view-title">Upcoming Events</div>
                 <div class="ohm-loader" style="width: 20px; height: 20px; border-width: 2px; margin: 0; display: none;" id="ohm-cards-loader"></div>
             </div>
            <div class="ohm-cards-count" id="ohm-event-count">...</div>
        </div>
        <div class="ohm-cards-filters">
            <div class="ohm-filter-btns">
                <button class="ohm-filter-btn active" data-filter="upcoming">Upcoming</button>
                <button class="ohm-filter-btn" data-filter="today">Today</button>
                <button class="ohm-filter-btn" data-filter="all">All</button>
            </div>
            <div class="ohm-search-container">
                <svg class="ohm-search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" class="ohm-search-input" id="ohm-search" placeholder="Search events..." autocomplete="off">
            </div>
        </div>
        <div class="ohm-cards-grid" id="ohm-cards-grid">
            <div class="ohm-state-msg"><div class="ohm-loader" style="display:block;"></div><p>Loading events...</p></div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';
    // CONFIG REQUIRED: Update these keys
    const SUPABASE_URL = 'https://pcutqzebmgiorfrajgcl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjdXRxemVibWdpb3JmcmFqZ2NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTEyOTIsImV4cCI6MjA4ODkyNzI5Mn0.tOjrxRSG6WXL5jZWoRYJgg9SbKeExwd1Cq_v1v_ld0k';
    const USE_REAL_SUPABASE = true; 

    // Calendar Elements
    const calGrid = document.getElementById('ohm-calendar-grid');
    const monthYear = document.getElementById('ohm-month-year');
    let displayMonthDate = new Date();
    
    // Cards Elements
    const cardsGrid = document.getElementById('ohm-cards-grid');
    const countEl = document.getElementById('ohm-event-count');
    const titleEl = document.getElementById('ohm-view-title');
    const searchInput = document.getElementById('ohm-search');
    const filterBtns = document.querySelectorAll('.ohm-filter-btn');
    const loader = document.getElementById('ohm-cards-loader');

    let allEvents = [];
    let currentFilter = 'upcoming'; 
    let searchQuery = '';
    let selectedDateFilter = null; // Stored as "YYYY-MM-DD"

    async function fetchEvents() {
        loader.style.display = 'block';
        if (!USE_REAL_SUPABASE) {
            allEvents = [
                {
                    title: 'Techno Night: Volume 1', description: 'Deep dark techno event running until early morning.',
                    start_time: new Date().toISOString(), location_name: 'Empire Underground', address: '93 N Pearl St, Albany, NY 12207',
                    image_url: 'https://images.unsplash.com/photo-1571266028243-cb40fce7573f?q=80&w=600&auto=format&fit=crop', 
                    tag: 'Music'
                },
                {
                    title: 'DRUM & BASS: The Movement', description: 'Documentary screening & sets.',
                    start_time: new Date(Date.now() + 86400000).toISOString(), location_name: 'Alias Coffee', address: '76 N Pearl St, Albany, NY 12207',
                    image_url: 'https://images.unsplash.com/photo-1598387181032-a3103ea27146?q=80&w=600&auto=format&fit=crop', 
                    tag: 'Art / Music'
                }
            ];
            setTimeout(() => {
                loader.style.display = 'none';
                allEvents.forEach(e => { e._dateObj = new Date(e.start_time); });
                renderCalendar();
                applyFilters();
            }, 500);
            return;
        }

        try {
            // Fetch events from the start of the current displayed month
            const fetchStart = new Date(displayMonthDate.getFullYear(), displayMonthDate.getMonth(), 1);
            
            // To be comprehensive, fetch up to 200 events starting from the month viewing
            const response = await fetch(`${SUPABASE_URL}/rest/v1/events?select=*,ticket_url,address&start_time=gte.${fetchStart.toISOString()}&order=start_time.asc&limit=200`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if(response.ok) {
                const fetchedEvents = await response.json();
                
                // Merge without duplicating (in case we fetch overlapping ranges)
                fetchedEvents.forEach(fe => {
                    if (!allEvents.find(e => e.id === fe.id)) {
                        fe._dateObj = new Date(fe.start_time);
                        allEvents.push(fe);
                    }
                });
                
                // Resort everything
                allEvents.sort((a,b) => a._dateObj - b._dateObj);
            }
            
            renderCalendar();
            applyFilters();
        } catch(e) { 
            console.error("Hybrid Widget err:", e);
            cardsGrid.innerHTML = `<div class="ohm-state-msg"><p>Failed to load events.</p></div>`;
            countEl.textContent = "0 events";
        } finally {
            loader.style.display = 'none';
        }
    }

    // ========== CALENDAR LOGIC ==========
    function renderCalendar() {
        calGrid.innerHTML = '';
        const year = displayMonthDate.getFullYear();
        const month = displayMonthDate.getMonth();
        
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        monthYear.textContent = `${monthNames[month]} ${year}`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();
        const today = new Date();
        const isCurrentMonth = today.getMonth() === month && today.getFullYear() === year;

        for (let i = 0; i < 42; i++) {
            const dayEl = document.createElement('div');
            dayEl.className = 'ohm-day';

            if (i < firstDay) {
                dayEl.textContent = daysInPrevMonth - firstDay + i + 1;
                dayEl.classList.add('other-month');
            } else if (i >= firstDay && i < firstDay + daysInMonth) {
                const dayNum = i - firstDay + 1;
                dayEl.textContent = dayNum;
                dayEl.classList.add('active-month');
                
                if (isCurrentMonth && dayNum === today.getDate()) {
                    dayEl.classList.add('today');
                }

                const cellDateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                dayEl.dataset.date = cellDateStr;
                
                // Check if this date has events
                const hasEvent = allEvents.some(e => {
                    return e._dateObj.getFullYear() === year && e._dateObj.getMonth() === month && e._dateObj.getDate() === dayNum;
                });
                
                if (hasEvent) dayEl.classList.add('has-events');
                if (selectedDateFilter === cellDateStr) dayEl.classList.add('selected');

                dayEl.addEventListener('click', () => {
                    if (selectedDateFilter === cellDateStr) {
                        selectedDateFilter = null;
                        dayEl.classList.remove('selected');
                        currentFilter = 'upcoming'; 
                        updateFilterButtonsUI();
                    } else {
                        filterBtns.forEach(b => b.classList.remove('active'));
                        currentFilter = 'calendar_date';
                        selectedDateFilter = cellDateStr;
                        
                        document.querySelectorAll('.ohm-day.selected').forEach(el => el.classList.remove('selected'));
                        dayEl.classList.add('selected');
                        
                        const formatter = new Intl.DateTimeFormat('en-US', { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' });
                        titleEl.textContent = formatter.format(new Date(year, month, dayNum));
                    }
                    applyFilters();
                });

            } else {
                dayEl.textContent = i - firstDay - daysInMonth + 1;
                dayEl.classList.add('other-month');
            }
            calGrid.appendChild(dayEl);
        }
    }

    document.getElementById('ohm-prev').addEventListener('click', () => {
        displayMonthDate.setMonth(displayMonthDate.getMonth() - 1);
        fetchEvents(); 
    });
    
    document.getElementById('ohm-next').addEventListener('click', () => {
        displayMonthDate.setMonth(displayMonthDate.getMonth() + 1);
        fetchEvents();
    });

    // ========== CARDS LOGIC ==========
    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        applyFilters();
    });

    function updateFilterButtonsUI() {
        filterBtns.forEach(btn => {
            if (btn.getAttribute('data-filter') === currentFilter) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        if (currentFilter === 'upcoming') titleEl.textContent = "Upcoming Events";
        if (currentFilter === 'today') titleEl.textContent = "Today's Events";
        if (currentFilter === 'all') titleEl.textContent = "All Events";
    }

    filterBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            currentFilter = e.target.getAttribute('data-filter');
            selectedDateFilter = null; // Clear calendar selection
            
            document.querySelectorAll('.ohm-day.selected').forEach(el => el.classList.remove('selected'));
            
            updateFilterButtonsUI();
            
            if (currentFilter === 'today') {
                const today = new Date();
                const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
                const todayEl = document.querySelector(`.ohm-day[data-date="${todayStr}"]`);
                if (todayEl) todayEl.classList.add('selected');
            }
            applyFilters();
        });
    });

    function applyFilters() {
        let filtered = allEvents;
        const now = new Date();
        
        if (currentFilter === 'calendar_date' && selectedDateFilter) {
            const [y, m, d] = selectedDateFilter.split('-').map(Number);
            filtered = filtered.filter(e => e._dateObj.getFullYear() === y && 
                                            e._dateObj.getMonth() === m - 1 && 
                                            e._dateObj.getDate() === d);
        } else if (currentFilter === 'upcoming') {
            const upcomingThreshold = new Date();
            upcomingThreshold.setHours(0,0,0,0);
            filtered = filtered.filter(e => e._dateObj >= upcomingThreshold);
        } else if (currentFilter === 'today') {
            const todayStart = new Date(); todayStart.setHours(0,0,0,0);
            const todayEnd = new Date(); todayEnd.setHours(23, 59, 59, 999);
            filtered = filtered.filter(e => e._dateObj >= todayStart && e._dateObj <= todayEnd);
        }

        if (searchQuery) {
            filtered = filtered.filter(e => {
                const q = searchQuery;
                const matchTitle = e.title && e.title.toLowerCase().includes(q);
                const matchLocation = e.location_name && e.location_name.toLowerCase().includes(q);
                const matchDesc = e.description && e.description.toLowerCase().includes(q);
                return matchTitle || matchLocation || matchDesc;
            });
        }

        renderCards(filtered);
    }

    function renderCards(events) {
        cardsGrid.innerHTML = '';
        countEl.textContent = `${events.length} event${events.length === 1 ? '' : 's'}`;

        if (events.length === 0) {
            cardsGrid.innerHTML = `<div class="ohm-state-msg"><p>No events found for this selection.</p></div>`;
            return;
        }

        const formatterDate = new Intl.DateTimeFormat('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const formatterTime = new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit' });

        events.forEach(event => {
            const card = document.createElement('div');
            card.className = 'ohm-card';
            
            const dateStr = formatterDate.format(event._dateObj);
            const startTimeStr = formatterTime.format(event._dateObj);
            let timeString = `${dateStr} • ${startTimeStr}`;
            
            if (event.end_time) {
                const endTimeStr = formatterTime.format(new Date(event.end_time));
                timeString += ` - ${endTimeStr}`;
            }

            let locationString = event.location_name || '';
            if (event.address) {
                 locationString += locationString ? `<br><span style="color:#888; font-size:12px;">${event.address}</span>` : event.address;
            }

            card.innerHTML = `
                ${event.image_url ? `<img src="${event.image_url}" alt="${event.title}" class="ohm-card-img" loading="lazy">` : `<div class="ohm-card-img"></div>`}
                <div class="ohm-card-content">
                    ${event.tag ? `<div class="ohm-card-tag">${event.tag}</div>` : ''}
                    <h3 class="ohm-card-title">${event.title}</h3>
                    <div class="ohm-card-meta">
                        <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/></svg>
                        <div>${timeString}</div>
                    </div>
                    ${locationString ? `
                    <div class="ohm-card-meta">
                        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        <div>${locationString}</div>
                    </div>` : ''}
                    ${event.description ? `<div class="ohm-card-desc">${event.description}</div>` : '<div style="flex-grow:1;"></div>'}
                    ${event.ticket_url ? `
                    <a href="${event.ticket_url}" target="_blank" rel="noopener noreferrer" class="ohm-ticket-btn">
                        Get Tickets
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </a>
                    ` : ''}
                </div>
            `;
            cardsGrid.appendChild(card);
        });
    }

    // Initialize fetch
    fetchEvents();
})();
</script>
