<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
body { background-color: #060606; margin: 0; padding: 24px; }
/* Vibe & Variables */
.ohm-cards-widget {
    --surface-color: #0f0f0f;
    --text-primary: #f0f0f0;
    --text-secondary: rgba(255, 255, 255, 0.6);
    --border-color: #1a1a1a;
    --border-hover: #333333;
    --font-family: 'Inter', sans-serif;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --transition: all 0.2s ease;
    
    font-family: var(--font-family);
    width: 100%;
    background-color: transparent;
    color: var(--text-primary);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}

.ohm-cards-widget * { box-sizing: border-box; margin: 0; padding: 0; }

.ohm-cards-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
}

@media (max-width: 600px) {
    .ohm-cards-grid { grid-template-columns: 1fr; gap: 14px; }
}

.ohm-card {
    background-color: var(--surface-color); border: 1px solid var(--border-color);
    border-radius: 0; overflow: hidden; display: block;
    transition: var(--transition); height: 100%; text-decoration: none;
}
.ohm-card:hover { border-color: var(--border-hover); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6); }

.ohm-card-img { 
    width: 100%; aspect-ratio: 2 / 3; object-fit: cover; 
    background-color: #161616; display: block; transition: var(--transition);
}
.ohm-card:hover .ohm-card-img { filter: brightness(1.1); }

/* Loader */
.ohm-state-msg {
    padding: 40px 20px; text-align: center; color: var(--text-secondary);
    background-color: var(--surface-color); border-radius: 0;
    border: 1px dashed var(--border-color); grid-column: 1 / -1;
}
.ohm-loader { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.08); border-top-color: #fff; border-radius: 50%; animation: ohm-spin 1s linear infinite; margin: 0 auto 16px; }
@keyframes ohm-spin { to { transform: rotate(360deg); } }
</style>

<div class="ohm-cards-widget" id="ohm-cards-container">
    <div class="ohm-cards-grid" id="ohm-cards-grid">
        <div class="ohm-state-msg"><div class="ohm-loader"></div><p>Loading events...</p></div>
    </div>
</div>

<script>
(function() {
    'use strict';
    // CONFIG REQUIRED: Update these keys
    const SUPABASE_URL = 'https://pcutqzebmgiorfrajgcl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjdXRxemVibWdpb3JmcmFqZ2NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTEyOTIsImV4cCI6MjA4ODkyNzI5Mn0.tOjrxRSG6WXL5jZWoRYJgg9SbKeExwd1Cq_v1v_ld0k';
    const USE_REAL_SUPABASE = true; 

    const grid = document.getElementById('ohm-cards-grid');

    let allEvents = [];

    async function fetchEvents() {
        if (!USE_REAL_SUPABASE) {
            // Mock Data
            allEvents = [
                {
                    title: 'Techno Night: Volume 1', description: 'Deep dark techno event running until early morning.',
                    start_time: new Date().toISOString(), location_name: 'Empire Underground', address: '93 N Pearl St, Albany, NY 12207',
                    image_url: 'https://images.unsplash.com/photo-1571266028243-cb40fce7573f?q=80&w=600&auto=format&fit=crop', 
                    tag: 'Music'
                },
                {
                    title: 'DRUM & BASS: The Movement', description: 'Documentary screening & sets.',
                    start_time: new Date(Date.now() + 86400000).toISOString(), location_name: 'Alias Coffee', address: '76 N Pearl St, Albany, NY 12207',
                    image_url: 'https://images.unsplash.com/photo-1598387181032-a3103ea27146?q=80&w=600&auto=format&fit=crop', 
                    tag: 'Art / Music'
                }
            ];
            setTimeout(() => renderCards(allEvents), 500);
            return;
        }

        try {
            // Fetch exactly 3 upcoming events
            const now = new Date().toISOString();
            const response = await fetch(`${SUPABASE_URL}/rest/v1/events?select=*,ticket_url,address&start_time=gte.${now}&order=start_time.asc&limit=3`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if(response.ok) {
                allEvents = await response.json();
                renderCards(allEvents);
            } else {
                throw new Error("Failed to fetch");
            }
        } catch(e) { 
            console.error("Cards Widget err:", e);
            grid.innerHTML = `<div class="ohm-state-msg"><p>Failed to load events.</p></div>`;
        }
    }

    function renderCards(events) {
        grid.innerHTML = '';

        if (events.length === 0) {
            grid.innerHTML = `<div class="ohm-state-msg"><p>No upcoming events found.</p></div>`;
            return;
        }

        events.forEach(event => {
            const card = document.createElement('a');
            card.className = 'ohm-card';
            card.href = 'https://ohm518.com/events';
            card.target = '_blank';
            
            card.innerHTML = `
                ${event.image_url ? `<img src="${event.image_url}" alt="${event.title}" class="ohm-card-img" loading="lazy">` : `<div class="ohm-card-img"></div>`}
            `;
            grid.appendChild(card);
        });
    }

    fetchEvents();
})();
</script>
<!-- WEBFLOW EMBED: Event Cards Widget Ends -->
