<style>
body { background-color: #060606; margin: 0; padding: 24px; }
/* Vibe & Variables */
.ohm-map-widget {
    --bg-color: #0f0f0f;
    --border-color: #1a1a1a;
    --border-hover: #333333;
    --accent-color: #ffffff;
    --font-family: 'Inter', sans-serif;
    --radius-lg: 16px;
    
    width: 100%;
    min-height: 400px;
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: none;
    background-color: transparent;
    position: relative;
}

#ohm-map-container { width: 100%; height: 100%; min-height: 400px; z-index: 1;}

/* Leaflet Dark Theme Overrides */
.leaflet-container { background-color: #060606; font-family: var(--font-family); }
.leaflet-bar a { background-color: var(--bg-color) !important; color: #fff !important; border-color: var(--border-color) !important; }
.leaflet-bar a:hover { background-color: var(--border-hover) !important; }

/* Custom Map Tooltip */
.ohm-map-tooltip {
    background-color: var(--bg-color); border: 1px solid var(--border-color);
    color: #fff; border-radius: 6px; padding: 5px 10px; font-weight: 500; font-size: 13px;
}
.leaflet-tooltip-left.ohm-map-tooltip::before { border-left-color: var(--border-color); }
.leaflet-tooltip-right.ohm-map-tooltip::before { border-right-color: var(--border-color); }
.leaflet-tooltip-top.ohm-map-tooltip::before { border-top-color: var(--border-color); }
.leaflet-tooltip-bottom.ohm-map-tooltip::before { border-bottom-color: var(--border-color); }

    background-size: contain; background-repeat: no-repeat; background-position: center;
    animation: ohm-rainbow-breathe-filter 6s infinite ease-in-out;

@keyframes ohm-rainbow-breathe-filter {
    0% { filter: drop-shadow(0 0 2px rgba(255, 100, 100, 0.6)); }
    16% { filter: drop-shadow(0 0 4px rgba(255, 180, 100, 0.9)); }
    33% { filter: drop-shadow(0 0 2px rgba(255, 255, 120, 0.6)); }
    50% { filter: drop-shadow(0 0 4px rgba(120, 255, 120, 0.9)); }
    66% { filter: drop-shadow(0 0 2px rgba(100, 150, 255, 0.6)); }
    83% { filter: drop-shadow(0 0 4px rgba(180, 100, 255, 0.9)); }
    100% { filter: drop-shadow(0 0 2px rgba(255, 100, 100, 0.6)); }
}

/* Card Styles Embedded in Leaflet Popup */
.leaflet-popup-content-wrapper { background: transparent; box-shadow: none; padding: 0; }
.leaflet-popup-content { margin: 0; width: 280px !important; }
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-close-button { color: #fff !important; text-shadow: 0 0 4px #000; right: 8px !important; top: 8px !important; font-size: 20px !important; }

.ohm-card {
    background-color: rgba(15, 15, 15, 0.75) !important; 
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08) !important; 
    font-family: var(--font-family);
    border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; color: #fff;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
}
.ohm-card-img { width: 100%; height: 140px; object-fit: cover; background-color: #161616; border-bottom: 1px solid var(--border-color); }
.ohm-card-content { padding: 16px; display: flex; flex-direction: column; }
.ohm-card-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(255,255,255,0.6); margin-bottom: 6px; font-weight: 500; }
.ohm-card-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; line-height: 1.3; color: #fff; margin-top: 0; }
.ohm-card-meta { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; line-height: 1.4;}
.ohm-card-meta svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; margin-top: 2px;}
.ohm-card-desc { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; margin-top: 10px; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.ohm-ticket-btn {
    display: inline-flex; justify-content: center; align-items: center; gap: 8px; box-sizing: border-box;
    background-color: #fff; color: #000; padding: 9px 14px;
    border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600;
    transition: all 0.2s; border: 1px solid transparent; width: 100%;
}
.ohm-ticket-btn:hover { background-color: #000; color: #fff; border-color: #fff; }
</style>

<div class="ohm-map-widget">
    <div id="ohm-map-container"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function() {
    'use strict';
    // CONFIG REQUIRED: Update these keys
    const SUPABASE_URL = 'https://pcutqzebmgiorfrajgcl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjdXRxemVibWdpb3JmcmFqZ2NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTEyOTIsImV4cCI6MjA4ODkyNzI5Mn0.tOjrxRSG6WXL5jZWoRYJgg9SbKeExwd1Cq_v1v_ld0k';
    const USE_REAL_SUPABASE = true; 

    let map = null;

    async function init() {
        // Init Map
        map = L.map('ohm-map-container', { zoomControl: false }).setView([42.6526, -73.7562], 12); // Default Albany coords
        L.control.zoom({ position: 'topright' }).addTo(map);

        // CartoDB Dark Matter
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OSM &copy; CARTO', subdomains: 'abcd', maxZoom: 20
        }).addTo(map);

        await fetchEvents();
    }

    async function fetchEvents() {
        let events = [];
        if (!USE_REAL_SUPABASE) {
            const now = new Date();
            events = [
                {
                    title: 'Techno Night: Volume 1', description: 'Deep dark techno event running until early morning.',
                    start_time: now.toISOString(), end_time: new Date(now.getTime() + 4 * 3600000).toISOString(), 
                    location_name: 'Empire Underground', address: '93 N Pearl St, Albany, NY 12207',
                    image_url: 'https://images.unsplash.com/photo-1571266028243-cb40fce7573f?q=80&w=600&auto=format&fit=crop', 
                    tag: 'Music', ticket_url: '#', lat: 42.6526, lng: -73.7562
                },
                {
                    title: 'DRUM & BASS: The Movement', description: 'Documentary screening & sets.',
                    start_time: new Date(Date.now() + 86400000).toISOString(), location_name: 'Alias Coffee', 
                    address: '76 N Pearl St, Albany, NY 12207',
                    image_url: 'https://images.unsplash.com/photo-1598387181032-a3103ea27146?q=80&w=600&auto=format&fit=crop', 
                    tag: 'Art / Music', ticket_url: '#', lat: 42.6644, lng: -73.7547
                },
                {
                    title: 'Ambient Gallery', description: 'Live ambient soundscapes.',
                    start_time: new Date(Date.now() + 604800000).toISOString(), location_name: 'Albany Barn', 
                    address: '56 2nd St, Albany, NY 12210',
                    tag: 'Art', ticket_url: '#', lat: 42.6622, lng: -73.7485
                }
            ];
        } else {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/events?select=*&lat=not.is.null&lng=not.is.null`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                if(response.ok) events = await response.json();
            } catch(e) { console.error("Map Widget err:", e); }
        }

        renderMarkers(events);
    }

    function renderMarkers(events) {
        if (!map || events.length === 0) return;
        const bounds = L.latLngBounds();

        const formatterDate = new Intl.DateTimeFormat('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const formatterTime = new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit' });

        events.forEach(event => {
            if (!event.lat || !event.lng) return;

            const customIcon = L.divIcon({ className: 'ohm-custom-marker', iconSize: [22, 16], iconAnchor: [11, 8] });
            
            // Build card HTML
            let timeString = '';
            if (event.start_time) {
                const dateStr = formatterDate.format(new Date(event.start_time));
                const startTimeStr = formatterTime.format(new Date(event.start_time));
                timeString = `${dateStr} • ${startTimeStr}`;
                if (event.end_time) {
                    const endTimeStr = formatterTime.format(new Date(event.end_time));
                    timeString += ` - ${endTimeStr}`;
                }
            }

            let locationString = event.location_name || '';
            if (event.address) {
                 locationString += locationString ? `<br><span style="color:#888; font-size:12px;">${event.address}</span>` : event.address;
            }

            const cardHtml = `
            <div class="ohm-card">
                <div class="ohm-card-content">
                    ${event.tag ? `<div class="ohm-card-tag">${event.tag}</div>` : ''}
                    <h3 class="ohm-card-title">${event.title}</h3>
                    ${timeString ? `
                    <div class="ohm-card-meta">
                        <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/></svg>
                        <div>${timeString}</div>
                    </div>` : ''}
                    ${locationString ? `
                    <div class="ohm-card-meta">
                        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        <div>${locationString}</div>
                    </div>` : ''}
                    ${event.description ? `<div class="ohm-card-desc">${event.description}</div>` : '<div style="flex-grow:1;"></div>'}
                    ${event.ticket_url ? `
                    <a href="${event.ticket_url}" target="_blank" rel="noopener noreferrer" class="ohm-ticket-btn">
                        Get Tickets
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </a>
                    ` : ''}
                </div>
            </div>`;

            L.marker([event.lat, event.lng], { icon: customIcon })
                .addTo(map)
                .bindTooltip(`<div class="ohm-map-tooltip">${event.title}</div>`, { direction: 'top', offset: [0, -10], opacity: 1 })
                .bindPopup(cardHtml, { autoPanPadding: [20, 20] });
            
            bounds.extend([event.lat, event.lng]);
        });

        setTimeout(() => { map.invalidateSize(); map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 }); }, 100);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
